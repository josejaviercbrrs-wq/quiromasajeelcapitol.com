<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>El Capitol Bienestar</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="navbar">
    <div class="logo">EL CAPITOL BIENESTAR</div>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>Recupera tu bienestar</h1>
        <p>Relaja tu cuerpo. Libera tu mente.</p>
        <a href="#reserva" class="btn">Reservar ahora</a>
    </div>
</section>

<section class="section">

<h2>Tratamientos</h2>

<div class="treatments">

    <div class="treatment">
        <img src="https://images.unsplash.com/photo-1588776814546-ec7e4f0a8c02?auto=format&fit=crop&w=800&q=80" alt="Masaje relajante profesional">
    </div>

    <div class="treatment">
        <img src="https://images.unsplash.com/photo-1600334089648-b0d9d3028eb2?auto=format&fit=crop&w=800&q=80" alt="Masaje terapéutico espalda">
    </div>

    <div class="treatment">
        <img src="https://images.unsplash.com/photo-1556228578-8c89e6adf883?auto=format&fit=crop&w=800&q=80" alt="Masaje spa corporal">
    </div>

    <div class="treatment">
        <img src="https://images.unsplash.com/photo-1591348278999-7d7f4b9bdb44?auto=format&fit=crop&w=800&q=80" alt="Masaje con aceites relajantes">
    </div>

</div>
    
<section id="reserva" class="section">
<h2>Llama para tu reserva aquí</h2>

<p>Horario: 10:00 - 20:00</p>

    <button class="btn" onclick="sendWhatsAppBooking()">Confirmar reserva</button>
</div>
</section>

<section class="section">
<h2>Reseñas</h2>

<div class="review-box">

    <input id="reviewName" placeholder="Tu nombre">
    <textarea id="reviewText" placeholder="Escribe tu reseña"></textarea>

    <div class="stars" id="starRating">
        <i class="fa fa-star"></i>
        <i class="fa fa-star"></i>
        <i class="fa fa-star"></i>
        <i class="fa fa-star"></i>
        <i class="fa fa-star"></i>
    </div>

    <button class="btn" onclick="addReview()">Enviar reseña</button>
</div>

<div id="reviewsContainer"></div>
</section>

<button id="topBtn" onclick="scrollTopSmooth()">↑</button>

<div class="floating">
    <a href="https://wa.me/34675752500" class="whatsapp"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.instagram.com/el_capitol_bienestar/" class="instagram"><i class="fab fa-instagram"></i></a>
    <a href="#" class="facebook"><i class="fab fa-facebook-f"></i></a>
    <a href="#" class="tiktok"><i class="fab fa-tiktok"></i></a>
</div>

<script src="script.js"></script>

</body>
</html>
