<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>El Capitol Bienestar</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- 🌐 LANGUAGE -->
<div class="lang-switch" onclick="toggleLang()">
    <img src="https://flagcdn.com/es.svg" id="flag">
</div>

<!-- ⬆️ TOP -->
<button class="top-btn" onclick="scrollTopSmooth()">
⬆
</button>

<header class="navbar">
    <div class="logo" data-es="QUIROMASAJE EL CAPITOL BIENESTAR" data-ca="QUIROMASSATGE EL CAPITOL BENESTAR">
        QUIROMASAJE EL CAPITOL BIENESTAR
    </div>
</header>

<section class="hero reveal">
    <div class="hero-content">
        <h1 data-es="Recupera tu bienestar" data-ca="Recupera el teu benestar">Recupera tu bienestar</h1>
        <p data-es="Relaja tu cuerpo. Libera tu mente." data-ca="Relax el teu cos. Allibera la teva ment.">
            Relaja tu cuerpo. Libera tu mente.
        </p>
    </div>
</section>

<!-- TRATAMIENTOS -->
<section class="section reveal">
<h2 data-es="Tratamientos" data-ca="Tractaments">Tratamientos</h2>

<div class="treatments">
    <div class="treatment"><img src="https://images.unsplash.com/photo-1519823551278-64ac92734fb1"></div>
    <div class="treatment"><img src="https://images.unsplash.com/photo-1540555700478-4be289fbecef"></div>
    <div class="treatment"><img src="https://images.unsplash.com/photo-1600334129128-685c5582fd35"></div>
    <div class="treatment"><img src="https://images.unsplash.com/photo-1515377905703-c4788e51af15"></div>
</div>
</section>

<!-- RESERVA -->
<section class="section reveal">
<h2 data-es="Reserva" data-ca="Reserva">Reserva</h2>

<div class="booking">
    <input type="date">
    <input type="time">
    <button class="btn">Reservar</button>
</div>
</section>

<!-- MAPA -->
<section class="section reveal location-section">

<h2 data-es="Ubicación" data-ca="Ubicació">Ubicación</h2>

<div class="map-card">
<iframe class="map-frame"
src="https://www.google.com/maps?q=Pla%C3%A7a%20d%27Alexander%20Fleming%2C%2012%2C%20Palma&z=18&output=embed"></iframe>

<div class="map-info">
<p>📍 Palma</p>
<a class="map-btn" target="_blank"
href="https://www.google.com/maps/dir/?api=1&destination=Pla%C3%A7a+d%27Alexander+Fleming+12">
Cómo llegar
</a>
</div>
</div>

</section>

<!-- RESEÑAS -->
<section class="section reveal">

<h2>Reseñas</h2>

<div class="review-box">

<input id="reviewName" placeholder="Nombre">
<textarea id="reviewText" placeholder="Reseña"></textarea>

<div class="stars" id="starRating">
<i class="fa fa-star"></i>
<i class="fa fa-star"></i>
<i class="fa fa-star"></i>
<i class="fa fa-star"></i>
<i class="fa fa-star"></i>
</div>

<button onclick="addReview()">Enviar</button>
</div>

<div id="reviewsContainer"></div>

</section>

<!-- WHATSAPP -->
<a class="whatsapp-float" href="https://wa.me/34675752500">
<i class="fab fa-whatsapp"></i>
</a>

<!-- REDES -->
<div class="social-float">
<a class="social-float-btn facebook"><i class="fab fa-facebook-f"></i></a>
<a class="social-float-btn instagram" href="https://www.instagram.com/el_capitol_bienestar/" target="_blank">
<i class="fab fa-instagram"></i>
</a>
<a class="social-float-btn tiktok"><i class="fab fa-tiktok"></i></a>
</div>

<script src="script.js"></script>

</body>
</html>
