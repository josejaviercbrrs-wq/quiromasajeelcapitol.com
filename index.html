<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>El Capitol Bienestar</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="navbar">
    <div class="logo">EL CAPITOL BIENESTAR</div>
</header>

<!-- HERO -->
<section class="hero">
    <img class="hero-image" src="https://i.ibb.co/gLGR0gjw/capitol.png" alt="Portada">

    <div class="hero-content">
        <h1>Recupera tu bienestar</h1>
        <p>Relaja tu cuerpo. Libera tu mente.</p>

        <a href="#reserva" class="btn">
            Reservar ahora
        </a>
    </div>
</section>

<!-- TRATAMIENTOS -->
<section class="section">
<h2>Tratamientos</h2>

<div class="treatments">

    <div class="treatment">
        <img src="https://i.ibb.co/RTM9h9sH/relajante.jpg">
        <div class="info">
            <h3>Relajante</h3>
            <p>30 minutos</p>
            <strong>30€</strong>
        </div>
    </div>

    <div class="treatment">
        <img src="https://i.ibb.co/Z6h1kKWV/deportivo.jpg">
        <div class="info">
            <h3>Deportivo</h3>
            <p>1 hora</p>
            <strong>60€</strong>
        </div>
    </div>

    <div class="treatment">
        <img src="https://i.ibb.co/svQ56Mr8/descontracturante.jpg">
        <div class="info">
            <h3>Descontracturante</h3>
            <p>1h 30 min</p>
            <strong>90€</strong>
        </div>
    </div>

</div>
</section>

<!-- RESERVA -->
<section id="reserva" class="section">
<h2>Reserva tu cita</h2>
<p>Horario: 10:00 - 20:00</p>

<a class="phone-btn"
   href="https://wa.me/34675752500?text=Hola%2C%20me%20gustaria%20reservar%20para%20un%20masaje"
   target="_blank">
📞 675 75 25 00
</a>
</section>

<!-- RESEÑAS -->
<section class="section">
<h2>Reseñas</h2>

<div class="review-box">

<input id="reviewName" placeholder="Tu nombre">
<textarea id="reviewText" placeholder="Escribe tu reseña"></textarea>

<div class="stars" id="starRating">
    <i class="fa-solid fa-star"></i>
    <i class="fa-solid fa-star"></i>
    <i class="fa-solid fa-star"></i>
    <i class="fa-solid fa-star"></i>
    <i class="fa-solid fa-star"></i>
</div>

<button class="btn" onclick="addReview()">Enviar reseña</button>

</div>

<div id="reviewsContainer"></div>
</section>

<!-- BOTÓN SUBIR -->
<button id="topBtn" onclick="scrollTopSmooth()">↑</button>

<!-- REDES -->
<div class="floating">
    <a href="https://wa.me/34675752500" class="whatsapp"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.instagram.com/el_capitol_bienestar/" class="instagram"><i class="fab fa-instagram"></i></a>
    <a href="https://www.facebook.com/people/El-capitol-bienestar/61591450350809/" class="facebook"><i class="fab fa-facebook-f"></i></a>
    <a href="https://www.tiktok.com/@miguel.villalonga21" class="tiktok"><i class="fab fa-tiktok"></i></a>
</div>

<script src="script.js"></script>

</body>
</html>
