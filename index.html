<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>El Capitol Bienestar</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="navbar">
    <div class="logo">EL CAPITOL BIENESTAR</div>
</header>

<section class="hero">

    <img class="hero-image" src="https://i.ibb.co/JjZ2MMjt/Whats-App-Image-2026-06-25-at-21-54-18.jpg" alt="hero">

    <div class="hero-content">
        <h1>Recupera tu bienestar</h1>
        <p>Relaja tu cuerpo. Libera tu mente.</p>
        <a href="#reserva" class="btn">Reservar ahora</a>
    </div>

</section>

<section class="section">

<div class="treatments">

    <div class="treatment">
        <img src="https://i.ibb.co/RTM9h9sH/como-hacer-masajes-relajantes-descubre-todos-sus-beneficios-0-ai1.jpg" alt="Masaje relajante">
        <div class="info">
            <h3>Relajante</h3>
            <p>30 minutos</p>
            <strong>30€</strong>
        </div>
    </div>

    <div class="treatment">
        <img src="https://i.ibb.co/Z6h1kKWV/887642-567af57554da4011aea6031d61a0c4f2-mv2.avif" alt="Masaje deportivo">
        <div class="info">
            <h3>Deportivo</h3>
            <p>1 hora</p>
            <strong>60€</strong>
        </div>
    </div>

    <div class="treatment">
        <img src="https://i.ibb.co/svQ56Mr8/fisioterapia-empresa-bilbao-santutxu.jpg" alt="Masaje descontracturante">
        <div class="info">
            <h3>Descontracturante</h3>
            <p>1h 30 min</p>
            <strong>90€</strong>
        </div>
    </div>

</div>

</section>

<section id="reserva" class="section">
<h2>Reserva tu cita</h2>
<p>Horario: 10:00 - 20:00</p>

<a href="https://wa.me/34675752500?text=Hola%20quiero%20reservar%20una%20cita"
target="_blank"
class="phone-btn">
📞 675 75 25 00
</a>
</section>

<section class="section">
<h2>Reseñas</h2>

<div class="review-box">

<input id="reviewName" placeholder="Tu nombre">
<textarea id="reviewText" placeholder="Escribe tu reseña"></textarea>

<div class="stars" id="starRating">
    <i class="fa fa-star"></i>
    <i class="fa fa-star"></i>
    <i class="fa fa-star"></i>
    <i class="fa fa-star"></i>
    <i class="fa fa-star"></i>
</div>

<button class="btn" onclick="addReview()">Enviar reseña</button>

</div>

<div id="reviewsContainer"></div>
</section>

<button id="topBtn" onclick="scrollTopSmooth()">↑</button>

<div class="floating">
    <a href="https://wa.me/34675752500" class="whatsapp"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.instagram.com/el_capitol_bienestar/" class="instagram"><i class="fab fa-instagram"></i></a>
    <a href="https://www.facebook.com/people/El-capitol-bienestar/61591450350809/" class="facebook"><i class="fab fa-facebook-f"></i></a>
    <a href="https://www.tiktok.com/@miguel.villalonga21" class="tiktok"><i class="fab fa-tiktok"></i></a>
</div>

<script src="script.js"></script>

</body>
</html>
