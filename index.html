<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiromasaje El Capitol Bienestar</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="navbar">
    <div class="logo">QUIROMASAJE EL CAPITOL BIENESTAR</div>
</header>

<!-- HERO -->
<section id="inicio" class="hero">
    <div class="hero-content">
        <h1>Recupera tu bienestar</h1>
        <p>Relaja tu cuerpo. Libera tu mente.</p>
    </div>
</section>

<!-- SERVICIOS -->
<section class="section">
    <h2>Tratamientos</h2>
</section>

<!-- GALERÍA -->
<section class="section">
    <h2>Centro</h2>
</section>

<!-- RESERVA -->
<section class="section cta">
    <h2>Reserva tu sesión</h2>
</section>

<!-- 📍 UBICACIÓN PRO -->
<section class="section location-section reveal">

<h2>Ubicación</h2>

<div class="map-card">

    <iframe
        class="map-frame"
        src="https://www.google.com/maps?q=Pla%C3%A7a%20d%27Alexander%20Fleming%2C%2012%2C%20Palma%20de%20Mallorca&z=18&output=embed"
        loading="lazy"
        allowfullscreen>
    </iframe>

    <div class="map-info">
        <p>📍 Plaça d'Alexander Fleming, 12 - Palma</p>

        <a class="map-btn"
           href="https://www.google.com/maps/dir/?api=1&destination=Pla%C3%A7a+d%27Alexander+Fleming+12+Palma"
           target="_blank">
           🧭 Cómo llegar
        </a>
    </div>

</div>

</section>
<!-- ⭐ RESEÑAS -->
<section id="resenas" class="section">

<h2>Reseñas de nuestros clientes</h2>

<select id="reviewFilter" onchange="loadReviews()">
    <option value="newest">Más recientes</option>
    <option value="highest">Mejor valoradas</option>
    <option value="lowest">Peor valoradas</option>
</select>

<div class="review-box">

    <input id="reviewName" class="review-input" type="text" placeholder="Tu nombre">

    <div class="stars" id="starRating">
        <i class="fa fa-star"></i>
        <i class="fa fa-star"></i>
        <i class="fa fa-star"></i>
        <i class="fa fa-star"></i>
        <i class="fa fa-star"></i>
    </div>

    <textarea id="reviewText" class="review-text" placeholder="Escribe tu reseña..."></textarea>

    <button onclick="addReview()">Enviar reseña</button>
    <button onclick="clearReviews()">Borrar reseñas</button>

</div>

<div class="reviews" id="reviewsContainer"></div>

</section>

<!-- WHATSAPP -->
<a href="https://wa.me/34675752500" class="whatsapp-float">
<i class="fab fa-whatsapp"></i>
</a>

<!-- REDES -->
<div class="social-float">

<a href="https://www.facebook.com" class="social-float-btn facebook" target="_blank">
<i class="fab fa-facebook-f"></i>
</a>

<a href="https://www.instagram.com/el_capitol_bienestar/" class="social-float-btn instagram" target="_blank">
<i class="fab fa-instagram"></i>
</a>

<a href="https://www.tiktok.com" class="social-float-btn tiktok" target="_blank">
<i class="fab fa-tiktok"></i>
</a>

</div>

<script src="script.js"></script>

</body>
</html>
