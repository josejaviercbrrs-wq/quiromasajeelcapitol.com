<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>El Capitol Bienestar</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="navbar">
    <div class="logo">EL CAPITOL BIENESTAR</div>
</header>

<!-- HERO -->
<section class="hero">
    <div class="hero-content">
        <h1>Recupera tu bienestar</h1>
        <p>Relaja tu cuerpo. Libera tu mente.</p>
        <a href="#reserva" class="btn">Reservar ahora</a>
    </div>
</section>

<!-- TRATAMIENTOS -->
<section class="section">
<h2>Tratamientos</h2>

<div class="treatments">
    <div class="treatment"><img src="https://images.unsplash.com/photo-1519823551278-64ac92734fb1"></div>
    <div class="treatment"><img src="https://images.unsplash.com/photo-1540555700478-4be289fbecef"></div>
    <div class="treatment"><img src="https://images.unsplash.com/photo-1600334129128-685c5582fd35"></div>
    <div class="treatment"><img src="https://images.unsplash.com/photo-1515377905703-c4788e51af15"></div>
</div>
</section>

<!-- RESERVA -->
<section id="reserva" class="section">
<h2>Reserva spa</h2>

<p>Horario: 08:00 - 21:00</p>

<div class="booking">
    <input type="date" id="date">
    <input type="time" id="time" min="08:00" max="21:00">
    <button class="btn">Confirmar reserva</button>
</div>
</section>

<!-- MAPA -->
<section class="section">
<h2>Ubicación</h2>

<div class="map-card">

<iframe class="map-frame"
src="https://www.google.com/maps?q=Pla%C3%A7a%20d%27Alexander%20Fleming%2C%2012%2C%20Palma&z=17&output=embed"></iframe>

<div class="map-info">
<p>📍 Plaça d'Alexander Fleming, 12 - Palma</p>

<a class="map-btn"
target="_blank"
href="https://www.google.com/maps/dir/?api=1&destination=Pla%C3%A7a+d%27Alexander+Fleming+12">
Cómo llegar
</a>

</div>

</div>
</section>

<!-- RESEÑAS -->
<section class="section">
<h2>Reseñas</h2>

<div class="review-box">

<input id="reviewName" placeholder="Tu nombre">
<textarea id="reviewText" placeholder="Escribe tu reseña"></textarea>

<div class="stars" id="starRating">
<i class="fa fa-star"></i>
<i class="fa fa-star"></i>
<i class="fa fa-star"></i>
<i class="fa fa-star"></i>
<i class="fa fa-star"></i>
</div>

<button onclick="addReview()" class="btn">Enviar reseña</button>
</div>

<div id="reviewsContainer"></div>
</section>

<!-- BOTÓN ARRIBA -->
<button id="topBtn" onclick="scrollTopSmooth()">↑</button>

<script src="script.js"></script>

</body>
</html>
